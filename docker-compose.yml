services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: kybyra-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: kybyra
      POSTGRES_PASSWORD: kybyra
      POSTGRES_DB: kybyra
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U kybyra']
      interval: 10s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer:latest
    container_name: kybyra-adminer
    restart: unless-stopped
    ports:
      - '8080:8080'
    depends_on:
      - postgres

volumes:
  postgres-data:
